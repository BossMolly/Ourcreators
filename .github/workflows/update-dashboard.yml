name: Daily Dashboard Update

on:
  schedule:
    - cron: '0 23 * * *'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build dashboard
        env:
          ANTHROPIC_API_KEY:      ${{ secrets.CAPI }}
          OPENWEATHER_API_KEY:    ${{ secrets.WEATHER }}
          NAVER_CLIENT_ID:        ${{ secrets.NAPI }}
          NAVER_CLIENT_SECRET:    ${{ secrets.NAPI }}
          YOUTUBE_API_KEY:        ${{ secrets.YOUTUBE }}
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM }}
        run: python main.py

      - name: Commit & push updated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html data/
          git diff --cached --quiet || git commit -m "chore: daily update $(date +'%Y-%m-%d')"
          git push origin main

      - name: Deploy to Vercel
        env:
          VERCEL_TOKEN:      ${{ secrets.VERCELTOKEN }}
          VERCEL_ORG_ID:     ${{ secrets.VERCELTEAMID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCELPROJECT }}
        run: |
          npm install -g vercel
          vercel --prod --token=$VERCEL_TOKEN --yes
